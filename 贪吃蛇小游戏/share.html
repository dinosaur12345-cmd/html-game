<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>贪吃蛇小游戏 - 分享</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .container {
      text-align: center;
      padding: 40px 20px;
      max-width: 400px;
    }
    h1 {
      font-size: 2.2rem;
      text-shadow: 0 0 30px rgba(100, 255, 150, 0.6);
      margin-bottom: 8px;
    }
    .subtitle {
      color: #aaa;
      font-size: 1rem;
      margin-bottom: 30px;
    }
    .qr-container {
      display: inline-block;
      padding: 16px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }
    .qr-container img, .qr-container canvas {
      display: block;
    }
    .hint {
      margin-top: 25px;
      color: #888;
      font-size: 0.95rem;
      line-height: 1.6;
    }
    .game-link {
      margin-top: 15px;
      color: #64ffda;
      font-size: 0.85rem;
      word-break: break-all;
      padding: 10px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
    }
    .btn {
      display: inline-block;
      margin-top: 25px;
      background: linear-gradient(135deg, #64ffda 0%, #4ade80 100%);
      border: none;
      border-radius: 50px;
      padding: 12px 40px;
      font-size: 1rem;
      font-weight: bold;
      color: #0a0a0a;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(100, 255, 150, 0.4);
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(100, 255, 150, 0.6);
    }
    .footer {
      margin-top: 40px;
      color: #555;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🐍 贪吃蛇 🐍</h1>
    <p class="subtitle">扫码即玩 · 经典重温</p>
    <div class="qr-container" id="qrcode"></div>
    <p class="hint">📱 使用手机扫描上方二维码<br>即可打开游戏</p>
    <div class="game-link" id="gameUrl"></div>
    <a class="btn" id="playBtn" href="./">开始游戏</a>
    <p class="footer">点击「开始游戏」或扫码直接畅玩</p>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    function getGameUrl() {
      var path = window.location.pathname
      var basePath = path.substring(0, path.lastIndexOf('/') + 1)
      return window.location.origin + basePath
    }
    var gameUrl = getGameUrl()
    document.getElementById('gameUrl').textContent = gameUrl
    new QRCode(document.getElementById('qrcode'), {
      text: gameUrl,
      width: 200,
      height: 200,
      colorDark: '#1a1a2e',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    })
    document.getElementById('playBtn').href = gameUrl
  </script>
</body>
</html>
